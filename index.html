<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lexique CMD / PowerShell</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          fontFamily: {
            sans: ["Inter", "ui-sans-serif", "system-ui", "Segoe UI", "sans-serif"],
            mono: ["Cascadia Code", "Consolas", "ui-monospace", "monospace"]
          },
          boxShadow: {
            glow: "0 0 0 1px rgba(56,189,248,.18), 0 20px 60px rgba(15,23,42,.18)"
          }
        }
      }
    };
  </script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    ::selection { background: rgba(14, 165, 233, .35); }
    .code-scroll::-webkit-scrollbar { height: 6px; }
    .code-scroll::-webkit-scrollbar-thumb { background: rgba(100, 116, 139, .6); border-radius: 999px; }
  </style>
</head>
<body class="min-h-screen bg-slate-100 text-slate-900 antialiased transition-colors dark:bg-slate-950 dark:text-slate-100">
  <main class="mx-auto flex min-h-screen w-full max-w-7xl flex-col px-4 py-5 sm:px-6 lg:px-8">
    <header class="flex flex-col gap-5 border-b border-slate-300/70 pb-5 dark:border-slate-800 md:flex-row md:items-end md:justify-between">
      <div class="space-y-3">
        <div class="inline-flex items-center gap-2 rounded-full border border-sky-500/30 bg-sky-500/10 px-3 py-1 text-sm font-medium text-sky-700 dark:text-sky-300">
          <i data-lucide="terminal-square" class="h-4 w-4"></i>
          Anti-seche Windows
        </div>
        <div>
          <h1 class="text-3xl font-bold tracking-normal text-slate-950 dark:text-white sm:text-4xl">
            Lexique CMD / PowerShell
          </h1>
          <p class="mt-2 max-w-2xl text-sm leading-6 text-slate-600 dark:text-slate-400 sm:text-base">
            Comparateur rapide des commandes classiques CMD et de leurs equivalents PowerShell modernes.
          </p>
        </div>
      </div>

      <button
        id="themeToggle"
        type="button"
        class="inline-flex h-11 items-center justify-center gap-2 rounded-md border border-slate-300 bg-white px-4 text-sm font-semibold text-slate-700 shadow-sm transition hover:bg-slate-50 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-200 dark:hover:bg-slate-800"
        aria-label="Basculer le theme"
      >
        <i id="themeIcon" data-lucide="moon" class="h-5 w-5"></i>
        <span id="themeLabel">Sombre</span>
      </button>
    </header>

    <section class="sticky top-0 z-10 -mx-4 border-b border-slate-300/70 bg-slate-100/90 px-4 py-4 backdrop-blur dark:border-slate-800 dark:bg-slate-950/90 sm:-mx-6 sm:px-6 lg:-mx-8 lg:px-8">
      <div class="flex flex-col gap-3 lg:flex-row lg:items-center lg:justify-between">
        <label class="relative block w-full lg:max-w-xl">
          <span class="sr-only">Recherche</span>
          <i data-lucide="search" class="pointer-events-none absolute left-3 top-1/2 h-5 w-5 -translate-y-1/2 text-slate-400"></i>
          <input
            id="searchInput"
            type="search"
            placeholder="Rechercher une action, commande, alias, description..."
            class="h-12 w-full rounded-md border border-slate-300 bg-white pl-10 pr-4 text-sm text-slate-900 outline-none transition placeholder:text-slate-400 focus:border-sky-500 focus:ring-4 focus:ring-sky-500/15 dark:border-slate-700 dark:bg-slate-900 dark:text-white dark:focus:border-sky-400"
          />
        </label>

        <div id="categoryFilters" class="flex gap-2 overflow-x-auto pb-1 lg:justify-end lg:pb-0"></div>
      </div>
    </section>

    <section class="flex items-center justify-between gap-3 py-4">
      <p id="resultCount" class="text-sm font-medium text-slate-600 dark:text-slate-400"></p>
      <button
        id="resetFilters"
        type="button"
        class="hidden h-9 items-center gap-2 rounded-md border border-slate-300 bg-white px-3 text-sm font-semibold text-slate-700 transition hover:bg-slate-50 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-200 dark:hover:bg-slate-800"
      >
        <i data-lucide="rotate-ccw" class="h-4 w-4"></i>
        Reinitialiser
      </button>
    </section>

    <section id="commandGrid" class="grid gap-4 pb-8 md:grid-cols-2 xl:grid-cols-3"></section>

    <section id="emptyState" class="hidden flex-1 items-center justify-center py-16 text-center">
      <div class="max-w-md">
        <div class="mx-auto flex h-14 w-14 items-center justify-center rounded-md bg-slate-200 text-slate-500 dark:bg-slate-800 dark:text-slate-400">
          <i data-lucide="search-x" class="h-7 w-7"></i>
        </div>
        <h2 class="mt-4 text-xl font-bold text-slate-950 dark:text-white">Aucun resultat</h2>
        <p class="mt-2 text-sm leading-6 text-slate-600 dark:text-slate-400">
          Modifie la recherche ou change de categorie pour retrouver une commande.
        </p>
      </div>
    </section>
  </main>

  <div
    id="toast"
    class="pointer-events-none fixed bottom-5 left-1/2 z-50 hidden -translate-x-1/2 rounded-md bg-slate-950 px-4 py-3 text-sm font-semibold text-white shadow-glow dark:bg-white dark:text-slate-950"
    role="status"
    aria-live="polite"
  >
    Copie !
  </div>

  <script>
    // Base de donnees embarquee.
    // Pour ajouter une commande, duplique un objet, garde les memes cles,
    // puis ajoute eventuellement une nouvelle categorie dans categoryMeta.
    const commands = [
      {
        category: "Fichiers & Dossiers",
        action: "Lister les fichiers et dossiers",
        cmd: "dir",
        powershell: "Get-ChildItem",
        alias: "ls, dir, gci",
        description: "Affiche le contenu du dossier courant.",
        example: "Get-ChildItem C:\\Windows"
      },
      {
        category: "Fichiers & Dossiers",
        action: "Changer de dossier",
        cmd: "cd C:\\Temp",
        powershell: "Set-Location C:\\Temp",
        alias: "cd, sl",
        description: "Change le repertoire courant de la session.",
        example: "Set-Location $HOME\\Documents"
      },
      {
        category: "Fichiers & Dossiers",
        action: "Creer un dossier",
        cmd: "mkdir Logs",
        powershell: "New-Item -ItemType Directory -Path Logs",
        alias: "mkdir, ni",
        description: "Cree un nouveau repertoire.",
        example: "New-Item -ItemType Directory -Path C:\\Temp\\Logs"
      },
      {
        category: "Fichiers & Dossiers",
        action: "Supprimer un fichier ou dossier",
        cmd: "del fichier.txt",
        powershell: "Remove-Item fichier.txt",
        alias: "rm, del, erase, ri",
        description: "Supprime un element. Ajoute -Recurse pour un dossier non vide.",
        example: "Remove-Item .\\old -Recurse -Force"
      },
      {
        category: "Fichiers & Dossiers",
        action: "Copier un element",
        cmd: "copy source.txt cible.txt",
        powershell: "Copy-Item source.txt cible.txt",
        alias: "copy, cp, cpi",
        description: "Copie un fichier ou un dossier vers une destination.",
        example: "Copy-Item .\\rapport.docx D:\\Sauvegarde\\"
      },
      {
        category: "Fichiers & Dossiers",
        action: "Deplacer ou renommer un element",
        cmd: "move ancien.txt nouveau.txt",
        powershell: "Move-Item ancien.txt nouveau.txt",
        alias: "move, mv, mi",
        description: "Deplace ou renomme un fichier ou dossier.",
        example: "Move-Item .\\logs C:\\Archive\\logs"
      },
      {
        category: "Reseau",
        action: "Tester la connectivite reseau",
        cmd: "ping 8.8.8.8",
        powershell: "Test-Connection 8.8.8.8",
        alias: "ping",
        description: "Envoie des paquets ICMP pour verifier si une machine repond.",
        example: "Test-Connection google.com -Count 4"
      },
      {
        category: "Reseau",
        action: "Afficher la configuration IP",
        cmd: "ipconfig /all",
        powershell: "Get-NetIPAddress",
        alias: "gip",
        description: "Liste les adresses IP et les interfaces reseau.",
        example: "Get-NetIPAddress -AddressFamily IPv4"
      },
      {
        category: "Reseau",
        action: "Resoudre un nom DNS",
        cmd: "nslookup openai.com",
        powershell: "Resolve-DnsName openai.com",
        alias: "-",
        description: "Interroge le DNS pour obtenir les enregistrements d'un domaine.",
        example: "Resolve-DnsName microsoft.com -Type MX"
      },
      {
        category: "Reseau",
        action: "Voir les connexions TCP",
        cmd: "netstat -ano",
        powershell: "Get-NetTCPConnection",
        alias: "-",
        description: "Affiche les connexions TCP, ports locaux et etats.",
        example: "Get-NetTCPConnection -State Listen"
      },
      {
        category: "Reseau",
        action: "Tracer ou tester un chemin reseau",
        cmd: "tracert 1.1.1.1",
        powershell: "Test-NetConnection 1.1.1.1 -TraceRoute",
        alias: "tnc",
        description: "Teste une destination et peut afficher la route empruntee.",
        example: "Test-NetConnection serveur.local -Port 443"
      },
      {
        category: "Systeme / Processus",
        action: "Lister les processus",
        cmd: "tasklist",
        powershell: "Get-Process",
        alias: "gps, ps",
        description: "Affiche les processus en cours d'execution.",
        example: "Get-Process | Sort-Object CPU -Descending"
      },
      {
        category: "Systeme / Processus",
        action: "Arreter un processus",
        cmd: "taskkill /PID 1234 /F",
        powershell: "Stop-Process -Id 1234 -Force",
        alias: "kill, spps",
        description: "Termine un processus par PID ou par nom.",
        example: "Stop-Process -Name notepad -Force"
      },
      {
        category: "Systeme / Processus",
        action: "Afficher les informations systeme",
        cmd: "systeminfo",
        powershell: "Get-ComputerInfo",
        alias: "-",
        description: "Recupere les informations detaillees sur Windows et la machine.",
        example: "Get-ComputerInfo | Select-Object WindowsProductName, CsName"
      },
      {
        category: "Systeme / Processus",
        action: "Arreter ou redemarrer la machine",
        cmd: "shutdown /s /t 0",
        powershell: "Stop-Computer",
        alias: "-",
        description: "Arrete l'ordinateur local ou distant avec les droits requis.",
        example: "Restart-Computer -ComputerName PC-ACCUEIL"
      },
      {
        category: "Systeme / Processus",
        action: "Lister les services Windows",
        cmd: "sc query",
        powershell: "Get-Service",
        alias: "gsv",
        description: "Affiche les services installes et leur etat.",
        example: "Get-Service | Where-Object Status -eq Running"
      },
      {
        category: "Droits / Utilisateurs",
        action: "Afficher l'utilisateur courant",
        cmd: "whoami",
        powershell: "$env:USERNAME",
        alias: "-",
        description: "Identifie le compte utilise dans la session courante.",
        example: "[System.Security.Principal.WindowsIdentity]::GetCurrent().Name"
      },
      {
        category: "Droits / Utilisateurs",
        action: "Lister les utilisateurs locaux",
        cmd: "net user",
        powershell: "Get-LocalUser",
        alias: "-",
        description: "Affiche les comptes locaux de l'ordinateur.",
        example: "Get-LocalUser | Select-Object Name, Enabled"
      },
      {
        category: "Droits / Utilisateurs",
        action: "Lister les groupes locaux",
        cmd: "net localgroup",
        powershell: "Get-LocalGroup",
        alias: "-",
        description: "Affiche les groupes locaux disponibles.",
        example: "Get-LocalGroupMember Administrateurs"
      }
    ];

    const categoryMeta = {
      "Tous": { icon: "layout-grid", badge: "bg-slate-200 text-slate-700 dark:bg-slate-800 dark:text-slate-200" },
      "Fichiers & Dossiers": { icon: "folder-tree", badge: "bg-amber-100 text-amber-800 dark:bg-amber-400/15 dark:text-amber-200" },
      "Reseau": { icon: "network", badge: "bg-cyan-100 text-cyan-800 dark:bg-cyan-400/15 dark:text-cyan-200" },
      "Systeme / Processus": { icon: "cpu", badge: "bg-emerald-100 text-emerald-800 dark:bg-emerald-400/15 dark:text-emerald-200" },
      "Droits / Utilisateurs": { icon: "shield-check", badge: "bg-violet-100 text-violet-800 dark:bg-violet-400/15 dark:text-violet-200" }
    };

    const state = {
      search: "",
      category: "Tous",
      theme: localStorage.getItem("cmdPsTheme") || "dark"
    };

    const grid = document.getElementById("commandGrid");
    const searchInput = document.getElementById("searchInput");
    const filters = document.getElementById("categoryFilters");
    const resultCount = document.getElementById("resultCount");
    const emptyState = document.getElementById("emptyState");
    const resetFilters = document.getElementById("resetFilters");
    const toast = document.getElementById("toast");
    const themeToggle = document.getElementById("themeToggle");
    const themeIcon = document.getElementById("themeIcon");
    const themeLabel = document.getElementById("themeLabel");

    function normalize(value) {
      return value.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    }

    function escapeHtml(value) {
      return value
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function applyTheme() {
      const isDark = state.theme === "dark";
      document.documentElement.classList.toggle("dark", isDark);
      themeIcon.setAttribute("data-lucide", isDark ? "moon" : "sun");
      themeLabel.textContent = isDark ? "Sombre" : "Clair";
      localStorage.setItem("cmdPsTheme", state.theme);
      lucide.createIcons();
    }

    function renderFilters() {
      const categories = ["Tous", ...new Set(commands.map((item) => item.category))];
      filters.innerHTML = categories.map((category) => {
        const active = state.category === category;
        const icon = categoryMeta[category]?.icon || "tag";
        return `
          <button
            type="button"
            class="category-btn inline-flex h-10 shrink-0 items-center gap-2 rounded-md border px-3 text-sm font-semibold transition ${
              active
                ? "border-sky-500 bg-sky-500 text-white shadow-sm"
                : "border-slate-300 bg-white text-slate-700 hover:bg-slate-50 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-200 dark:hover:bg-slate-800"
            }"
            data-category="${escapeHtml(category)}"
          >
            <i data-lucide="${icon}" class="h-4 w-4"></i>
            ${escapeHtml(category)}
          </button>
        `;
      }).join("");

      document.querySelectorAll(".category-btn").forEach((button) => {
        button.addEventListener("click", () => {
          state.category = button.dataset.category;
          render();
        });
      });
    }

    function commandBlock(label, command, accentClass) {
      return `
        <div class="rounded-md border border-slate-200 bg-slate-50 p-3 dark:border-slate-800 dark:bg-slate-950/80">
          <div class="mb-2 flex items-center justify-between gap-2">
            <span class="text-xs font-bold uppercase tracking-normal ${accentClass}">${label}</span>
            <button
              type="button"
              class="copy-btn inline-flex h-8 w-8 items-center justify-center rounded-md border border-slate-300 bg-white text-slate-600 transition hover:border-sky-400 hover:text-sky-600 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-300 dark:hover:border-sky-400 dark:hover:text-sky-300"
              data-copy="${escapeHtml(command)}"
              aria-label="Copier ${label}"
            >
              <i data-lucide="copy" class="h-4 w-4"></i>
            </button>
          </div>
          <pre class="code-scroll overflow-x-auto whitespace-pre rounded bg-slate-950 px-3 py-2 font-mono text-sm leading-6 text-slate-100"><code>${escapeHtml(command)}</code></pre>
        </div>
      `;
    }

    function renderCards(items) {
      grid.innerHTML = items.map((item) => {
        const meta = categoryMeta[item.category] || categoryMeta["Tous"];
        return `
          <article class="flex h-full flex-col rounded-lg border border-slate-200 bg-white p-4 shadow-sm transition hover:-translate-y-0.5 hover:shadow-glow dark:border-slate-800 dark:bg-slate-900">
            <div class="mb-4 flex items-start justify-between gap-3">
              <span class="inline-flex items-center gap-1.5 rounded-full px-2.5 py-1 text-xs font-bold ${meta.badge}">
                <i data-lucide="${meta.icon}" class="h-3.5 w-3.5"></i>
                ${escapeHtml(item.category)}
              </span>
            </div>

            <h2 class="text-lg font-bold leading-snug text-slate-950 dark:text-white">${escapeHtml(item.action)}</h2>
            <p class="mt-2 min-h-12 text-sm leading-6 text-slate-600 dark:text-slate-400">${escapeHtml(item.description)}</p>

            <div class="mt-4 grid gap-3">
              ${commandBlock("CMD", item.cmd, "text-sky-700 dark:text-sky-300")}
              ${commandBlock("PowerShell", item.powershell, "text-emerald-700 dark:text-emerald-300")}
            </div>

            <div class="mt-4 space-y-2 border-t border-slate-200 pt-4 text-sm dark:border-slate-800">
              <p class="flex flex-wrap gap-2 text-slate-600 dark:text-slate-400">
                <span class="font-semibold text-slate-800 dark:text-slate-200">Alias :</span>
                <span>${escapeHtml(item.alias)}</span>
              </p>
              <p class="text-slate-600 dark:text-slate-400">
                <span class="font-semibold text-slate-800 dark:text-slate-200">Exemple :</span>
                <code class="rounded bg-slate-100 px-1.5 py-0.5 font-mono text-xs text-slate-800 dark:bg-slate-800 dark:text-slate-100">${escapeHtml(item.example)}</code>
              </p>
            </div>
          </article>
        `;
      }).join("");
    }

    function getFilteredCommands() {
      const query = normalize(state.search.trim());
      return commands.filter((item) => {
        const matchesCategory = state.category === "Tous" || item.category === state.category;
        const haystack = normalize([
          item.category,
          item.action,
          item.cmd,
          item.powershell,
          item.alias,
          item.description,
          item.example
        ].join(" "));

        return matchesCategory && (!query || haystack.includes(query));
      });
    }

    async function copyToClipboard(text) {
      try {
        await navigator.clipboard.writeText(text);
      } catch (error) {
        const fallback = document.createElement("textarea");
        fallback.value = text;
        fallback.style.position = "fixed";
        fallback.style.opacity = "0";
        document.body.appendChild(fallback);
        fallback.select();
        document.execCommand("copy");
        fallback.remove();
      }

      showToast("Copie !");
    }

    function bindCopyButtons() {
      document.querySelectorAll(".copy-btn").forEach((button) => {
        button.addEventListener("click", () => copyToClipboard(button.dataset.copy));
      });
    }

    let toastTimer;
    function showToast(message) {
      toast.textContent = message;
      toast.classList.remove("hidden");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.add("hidden"), 1300);
    }

    function render() {
      renderFilters();
      const items = getFilteredCommands();
      renderCards(items);

      resultCount.textContent = `${items.length} commande${items.length > 1 ? "s" : ""} affichee${items.length > 1 ? "s" : ""}`;
      emptyState.classList.toggle("hidden", items.length > 0);
      emptyState.classList.toggle("flex", items.length === 0);
      resetFilters.classList.toggle("hidden", !state.search && state.category === "Tous");
      resetFilters.classList.toggle("inline-flex", Boolean(state.search || state.category !== "Tous"));

      bindCopyButtons();
      lucide.createIcons();
    }

    searchInput.addEventListener("input", (event) => {
      state.search = event.target.value;
      render();
    });

    resetFilters.addEventListener("click", () => {
      state.search = "";
      state.category = "Tous";
      searchInput.value = "";
      render();
    });

    themeToggle.addEventListener("click", () => {
      state.theme = state.theme === "dark" ? "light" : "dark";
      applyTheme();
    });

    applyTheme();
    render();
  </script>
</body>
</html>
